name: STARWELL Server

on:
  push:
    branches:
      - feat/starwell-server
      - main
    paths:
      - 'starwell-server/**'
      - 'package.json'
      - '.nvmrc'
      - '.github/workflows/starwell-server.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'starwell-server/**'
      - 'package.json'
      - '.nvmrc'
      - '.github/workflows/starwell-server.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: starwell-server-pages
  cancel-in-progress: true

jobs:
  verify:
    name: Verify place
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hearthfire
        uses: actions/checkout@v4

      - name: Resolve current Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Show runtime
        run: node --version

      - name: Install workspace
        run: npm install

      - name: Check server and client syntax
        run: npm run starwell:check

      - name: Test place contract
        run: npm run starwell:test

  deploy:
    name: Publish place
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Hearthfire
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload STARWELL place
        uses: actions/upload-pages-artifact@v3
        with:
          path: starwell-server/public

      - name: Deploy STARWELL
        id: deployment
        uses: actions/deploy-pages@v4
