name: STARWELL Server Verify

on:
  push:
    branches:
      - main
    paths:
      - 'starwell-server/**'
      - 'package.json'
      - '.nvmrc'
      - '.github/workflows/starwell-server.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'starwell-server/**'
      - 'package.json'
      - '.nvmrc'
      - '.github/workflows/starwell-server.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify place
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Hearthfire
        uses: actions/checkout@v5

      - name: Resolve current Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Show runtime
        run: node --version

      - name: Check server syntax
        run: node --check starwell-server/server.mjs

      - name: Check Concordance Engine syntax
        run: node --check starwell-server/public/concordance-engine.js

      - name: Check client syntax
        run: node --check starwell-server/public/starwell.js

      - name: Test place and REI Mythience contracts
        run: node --test starwell-server/test/*.test.mjs
