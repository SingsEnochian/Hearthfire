name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  protocols:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Hearthfire
        uses: actions/checkout@v7

      - name: Use pinned Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check protocols
        run: npm run check

      - name: Test protocols
        run: npm test
